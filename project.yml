name: Quickdict
options:
  bundleIdPrefix: com.quickdict
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    PRODUCT_NAME: Quickdict
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"
    ENABLE_HARDENED_RUNTIME: "YES"

packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    from: 0.12.4

targets:
  Quickdict:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - "**/.DS_Store"
      - path: Resources
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.quickdict.app
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Resources/Quickdict.entitlements
        ENABLE_HARDENED_RUNTIME: "YES"
    dependencies:
      - package: FluidAudio
    entitlements:
      path: Resources/Quickdict.entitlements
      properties:
        com.apple.security.device.audio-input: true
        com.apple.security.app-sandbox: false

  QuickdictTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: QuickdictTests/Sources
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: Quickdict
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.quickdict.app.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Quickdict.app/Contents/MacOS/Quickdict"

schemes:
  Quickdict:
    build:
      targets:
        Quickdict: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - QuickdictTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
