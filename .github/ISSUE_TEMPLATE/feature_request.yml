name: Feature request
description: Suggest an improvement for Quickdict
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature or behavior you want.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add examples, screenshots, or related workflows.
